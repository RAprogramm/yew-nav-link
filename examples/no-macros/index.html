<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yew-nav-link — Interactive Demo</title>
    <style>
        /* ── Tokens ─────────────────────────────────────── */
        :root {
            --bg:        #0b1120;
            --bg-surface:#111827;
            --bg-card:   #1a2332;
            --bg-elevated:#1e293b;
            --bg-code:   #0d1520;
            --accent:    #38bdf8;
            --accent-hover:#7dd3fc;
            --accent-dim:rgba(56,189,248,.15);
            --text:      #e2e8f0;
            --text-dim:  #64748b;
            --text-muted:#475569;
            --text-bright:#f8fafc;
            --border:    #1e293b;
            --border-focus:#334155;
            --green:     #4ade80;
            --red:       #f87171;
            --yellow:    #fbbf24;
            --purple:    #a78bfa;
            --pink:      #f472b6;
            --radius:    0.75rem;
            --topbar-h:  3.5rem;
            --sidebar-w: 16rem;
            --transition:0.2s cubic-bezier(.4,0,.2,1);
        }

        /* ── Reset ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            min-height: 100vh;
            overflow-x: hidden;
        }
        a { color: var(--accent); text-decoration: none; transition: color var(--transition); }
        a:hover { color: var(--accent-hover); }

        /* ── Topbar (desktop: hidden, mobile: visible) ──── */
        .topbar {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--topbar-h);
            background: rgba(17,24,39,.82);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid var(--border);
            z-index: 30;
            align-items: center;
            padding: 0 1rem;
            gap: 0.75rem;
        }
        .topbar-brand {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.02em;
        }
        .topbar-spacer { flex: 1; }

        /* ── Hamburger ──────────────────────────────────── */
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 0.3125rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.5rem 0.625rem;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
        }
        .hamburger:hover { border-color: var(--accent); background: var(--accent-dim); }
        .hamburger-line {
            display: block;
            width: 1.25rem;
            height: 0.125rem;
            background: var(--text);
            border-radius: 0.0625rem;
            transition: transform var(--transition), opacity var(--transition);
        }

        /* ── Sidebar ────────────────────────────────────── */
        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: var(--sidebar-w);
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 20;
            transition: transform var(--transition);
            -webkit-overflow-scrolling: touch;
        }
        .sidebar-inner {
            padding: 1.5rem 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .sidebar-header {
            padding: 0 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.75rem;
        }
        .sidebar-logo {
            font-size: 1.125rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--accent);
            line-height: 1.3;
        }
        .sidebar-version {
            font-size: 0.6875rem;
            color: var(--text-muted);
            margin-top: 0.125rem;
        }

        .sidebar-section { margin-bottom: 0.25rem; }

        .sidebar-section-title {
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 0.625rem 0.75rem 0.375rem;
        }

        .sidebar .nav-link {
            display: block;
            padding: 0.4rem 0.75rem;
            color: var(--text-dim);
            font-size: 0.8125rem;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: all var(--transition);
            line-height: 1.5;
        }
        .sidebar .nav-link:hover {
            color: var(--text);
            background: var(--accent-dim);
            text-decoration: none;
        }
        .sidebar .nav-link.active {
            color: var(--accent);
            background: var(--accent-dim);
            font-weight: 600;
        }

        /* ── Overlay (mobile) ───────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* ── Main ───────────────────────────────────────── */
        .main {
            margin-left: var(--sidebar-w);
            padding: 2.5rem 3rem 4rem;
            max-width: 56rem;
            min-width: 0;
            width: 100%;
        }

        /* ── Hero ────────────────────────────────────────── */
        .hero {
            text-align: center;
            padding: 2.5rem 0 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }
        .hero h1 {
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .hero p {
            font-size: 1rem;
            color: var(--text-dim);
            max-width: 30rem;
            margin: 0 auto 1.5rem;
            line-height: 1.6;
        }
        .hero-badges {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 6.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }
        .badge-accent { border-color: var(--accent); color: var(--accent); }
        .badge-green  { border-color: var(--green);  color: var(--green); }
        .badge-purple { border-color: var(--purple); color: var(--purple); }

        /* ── Cards ───────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.25rem;
            overflow: hidden;
            transition: border-color var(--transition);
        }
        .card:hover { border-color: var(--border-focus); }
        .card h2 {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text-bright);
            margin-bottom: 0.375rem;
            letter-spacing: -0.02em;
        }
        .card h3 {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--accent);
            margin: 1.125rem 0 0.5rem;
        }
        .card p {
            color: var(--text-dim);
            margin-bottom: 0.625rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* ── Code ────────────────────────────────────────── */
        pre {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 0.625rem;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.8125rem;
            line-height: 1.6;
            margin: 0.625rem 0;
            max-width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        code {
            font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
            font-size: 0.8125rem;
        }
        p > code, li > code, td > code {
            background: var(--bg-code);
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            border: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--accent);
            word-break: break-all;
        }

        /* ── Syntax tokens ───────────────────────────────── */
        .kw  { color: var(--purple); }
        .fn  { color: var(--accent); }
        .str { color: var(--green); }
        .cm  { color: var(--text-muted); font-style: italic; }
        .ty  { color: var(--yellow); }
        .pr  { color: var(--pink); }
        .pn  { color: var(--text-dim); }

        /* ── Demo ────────────────────────────────────────── */
        .demo {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.625rem;
            padding: 1rem;
            margin: 0.75rem 0;
        }
        .demo-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.625rem;
            font-weight: 700;
        }
        .demo .nav-link {
            display: block;
            padding: 0.375rem 0.75rem;
            color: var(--text);
            border-radius: 0.375rem;
            transition: all var(--transition);
            font-size: 0.8125rem;
            word-wrap: break-word;
        }
        .demo .nav-link:hover { background: var(--accent-dim); text-decoration: none; }
        .demo .nav-link.active { background: var(--accent); color: var(--bg); font-weight: 600; }
        .demo .nav-list { list-style: none; padding: 0; margin: 0; }
        .demo .nav-list .nav-item { margin-bottom: 0.0625rem; }

        .demo .nav-badge {
            display: inline-block;
            padding: 0.0625rem 0.5rem;
            border-radius: 6.25rem;
            font-size: 0.625rem;
            font-weight: 700;
            margin-left: 0.25rem;
            vertical-align: middle;
        }
        .demo .nav-badge-primary { background: var(--accent); color: var(--bg); }
        .demo .nav-badge-danger  { background: var(--red); color: #fff; }
        .demo .nav-badge-success { background: var(--green); color: var(--bg); }
        .demo .nav-badge-warning { background: var(--yellow); color: var(--bg); }
        .demo .nav-badge-pill { border-radius: 6.25rem; }

        .demo .nav-header {
            padding: 0.375rem 0.75rem;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            list-style: none;
        }
        .demo .nav-text { padding: 0.25rem 0.75rem; font-size: 0.75rem; color: var(--text-dim); display: block; }
        .demo .nav-divider { border: none; border-top: 1px solid var(--border); margin: 0.375rem 0; }
        .demo .nav-icon { font-style: normal; margin-right: 0.25rem; }
        .demo .nav-icon-sm { font-size: 0.75rem; }
        .demo .nav-icon-md { font-size: 1rem; }
        .demo .nav-icon-lg { font-size: 1.25rem; }

        .demo .nav-dropdown { list-style: none; position: relative; }
        .demo .nav-dropdown-toggle {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.8125rem;
            width: 100%;
            text-align: left;
            transition: border-color var(--transition);
        }
        .demo .nav-dropdown-toggle:hover { border-color: var(--accent); }
        .demo .nav-dropdown-menu {
            list-style: none;
            padding: 0.375rem 0;
            margin-top: 0.1875rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            box-shadow: 0 0.75rem 2rem rgba(0,0,0,.35);
        }
        .demo .nav-dropdown-item { list-style: none; }
        .demo .nav-dropdown-item a {
            display: block;
            padding: 0.375rem 0.875rem;
            color: var(--text);
            font-size: 0.8125rem;
            border-radius: 0.25rem;
            margin: 0 0.25rem;
        }
        .demo .nav-dropdown-item a:hover { background: var(--accent-dim); text-decoration: none; }
        .demo .nav-dropdown-item.disabled a { color: var(--text-muted); opacity: 0.5; pointer-events: none; }
        .demo .nav-dropdown-divider { border-top: 1px solid var(--border); margin: 0.25rem 0; list-style: none; }

        .demo .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            list-style: none;
            border-bottom: 2px solid var(--border);
            padding: 0;
            margin: 0 0 1rem;
            gap: 0.125rem;
        }
        .demo .nav-tabs.nav-tabs-fill { width: 100%; }
        .demo .nav-tabs.nav-tabs-fill .nav-tab { flex: 1; text-align: center; }
        .demo .nav-tab { list-style: none; }
        .demo .nav-tab button {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .demo .nav-tab button:hover { color: var(--text); }
        .demo .nav-tab.active button { color: var(--accent); border-bottom-color: var(--accent); }
        .demo .nav-tab.disabled button { color: var(--text-muted); opacity: 0.4; cursor: not-allowed; }
        .demo .nav-tab-panel { padding: 0.5rem 0; color: var(--text-dim); }

        .demo .pagination { display: flex; flex-wrap: wrap; list-style: none; gap: 0.1875rem; padding: 0; }
        .demo .pagination-item { list-style: none; }
        .demo .pagination-item button {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.75rem;
            min-width: 2rem;
            transition: all var(--transition);
        }
        .demo .pagination-item button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .demo .pagination-item.active button { background: var(--accent); border-color: var(--accent); color: var(--bg); }
        .demo .pagination-item button:disabled { opacity: 0.3; cursor: not-allowed; }

        .demo .breadcrumb-list { display: flex; flex-wrap: wrap; list-style: none; gap: 0.375rem; padding: 0; }
        .demo .breadcrumb-item { color: var(--text-dim); font-size: 0.8125rem; }
        .demo .breadcrumb-item.active { color: var(--accent); font-weight: 600; }
        .demo .breadcrumb-item + .breadcrumb-item::before { content: "/"; margin-right: 0.375rem; color: var(--text-muted); }

        /* ── Tables ──────────────────────────────────────── */
        .doc-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
            margin: 0.5rem 0;
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .doc-table thead th {
            text-align: left;
            padding: 0.5rem 0.625rem;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-focus);
            font-weight: 700;
            white-space: nowrap;
        }
        .doc-table tbody td {
            padding: 0.5rem 0.625rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .doc-table tbody tr:last-child td { border-bottom: none; }
        .doc-table tbody tr:hover { background: var(--accent-dim); }
        .doc-table code {
            background: var(--bg-code);
            padding: 0.0625rem 0.3125rem;
            border-radius: 0.1875rem;
            border: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--accent);
        }
        .doc-table strong { color: var(--text); }

        .demo table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
        .demo table td { padding: 0.3125rem 0.625rem; border-bottom: 1px solid var(--border); }

        .card ul { list-style: disc; padding-left: 1.25rem; margin: 0.375rem 0; }
        .card ul li { margin-bottom: 0.125rem; color: var(--text-dim); line-height: 1.6; }
        .card ul li code { color: var(--accent); }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(14rem, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            transition: border-color var(--transition), transform var(--transition);
        }
        .feature-card:hover { border-color: var(--accent); transform: translateY(-0.125rem); }
        .feature-card h4 { font-size: 0.875rem; color: var(--accent); margin-bottom: 0.25rem; font-weight: 600; }
        .feature-card p  { font-size: 0.75rem; color: var(--text-dim); line-height: 1.5; }

        /* ── Popup ───────────────────────────────────────── */
        .popup-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(0.25rem);
            z-index: 100;
            display: flex; align-items: center; justify-content: center;
            padding: 1rem;
            animation: fadeIn .12s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .popup-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-focus);
            border-radius: 0.875rem;
            padding: 1.5rem 1.75rem;
            width: 100%;
            max-width: 28rem;
            box-shadow: 0 1.5rem 4rem rgba(0,0,0,.45);
            animation: popIn .18s ease;
        }
        @keyframes popIn { from { transform: scale(0.96) translateY(0.5rem); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .popup-badge {
            font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; padding: 0.1875rem 0.5rem;
            border-radius: 0.375rem; background: var(--border); color: var(--text-dim);
        }
        .popup-badge.popup-active { background: var(--accent); color: var(--bg); }
        .popup-close {
            background: none; border: none; color: var(--text-dim);
            font-size: 1.25rem; cursor: pointer; padding: 0 0.125rem; line-height: 1;
            border-radius: 0.25rem; transition: color var(--transition);
        }
        .popup-close:hover { color: var(--text); }
        .popup-title { font-size: 1rem; font-weight: 700; color: var(--text-bright); margin-bottom: 1rem; }
        .popup-row { display: flex; align-items: baseline; gap: 0.625rem; margin-bottom: 0.625rem; font-size: 0.8125rem; }
        .popup-label {
            color: var(--text-dim); font-size: 0.6875rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.04em;
            min-width: 3.5rem; flex-shrink: 0;
        }
        .popup-row code {
            background: var(--bg-code); padding: 0.125rem 0.375rem;
            border-radius: 0.25rem; border: 1px solid var(--border);
            font-size: 0.75rem; color: var(--accent); word-break: break-all;
        }
        .popup-yes { color: var(--green); font-weight: 600; }
        .popup-no  { color: var(--text-dim); }

        /* ══════════════════════════════════════════════════
           RESPONSIVE
           ══════════════════════════════════════════════════ */

        /* ── Tablet (< 64rem) ────────────────────────────── */
        @media (max-width: 64rem) {
            .topbar { display: flex; }

            .sidebar {
                top: var(--topbar-h);
                transform: translateX(-100%);
                width: 18rem;
                box-shadow: 2rem 0 4rem rgba(0,0,0,.3);
                border-right: 1px solid var(--border-focus);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-header { padding-top: 0.5rem; }

            .overlay { top: var(--topbar-h); }

            .main {
                margin-left: 0;
                padding: calc(var(--topbar-h) + 1.5rem) 1.5rem 3rem;
            }

            .card { padding: 1.25rem; }
        }

        /* ── Phone (< 40rem) ─────────────────────────────── */
        @media (max-width: 40rem) {
            .main { padding: calc(var(--topbar-h) + 1rem) 0.875rem 2.5rem; }
            .hero h1 { font-size: 1.5rem; }
            .hero p  { font-size: 0.875rem; }
            .card { padding: 0.875rem; }
            .card h2 { font-size: 1.125rem; }
            .feature-grid { grid-template-columns: 1fr; }
            pre { padding: 0.625rem 0.75rem; font-size: 0.6875rem; }
            .popup-card { padding: 1rem 1.25rem; }
            .doc-table { font-size: 0.6875rem; }
            .doc-table thead th { padding: 0.25rem 0.375rem; }
            .doc-table tbody td { padding: 0.25rem 0.375rem; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import init from '/pkg/no_macros.js';
        init().catch(console.error);
    </script>
</body>
</html>
