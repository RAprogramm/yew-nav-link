[advisories]
ignore = [
  "RUSTSEC-2025-0141", # bincode unmaintained - transitive from yew
  "RUSTSEC-2024-0370", # proc-macro-error unmaintained - transitive from yew
]

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Unicode-3.0"]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "allow"
unknown-git = "allow"
