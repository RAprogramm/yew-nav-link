[advisories]
ignore = [
    "RUSTSEC-2025-0141",  # bincode unmaintained - transitive from yew
    "RUSTSEC-2024-0370",  # proc-macro-error unmaintained - transitive from yew
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CC-BY-4.0",
    "Unlicense",
    "GPL-3.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "Apache-2.0 WITH LLVM-exception",
    "GPL-2.0 WITH Linux-syscall-note",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "allow"
unknown-git = "allow"