name: Cargo Info
description: Extract package metadata from Cargo.toml
author: yew-nav-link team

outputs:
  version:
    description: Package version
  name:
    description: Package name
  msrv:
    description: Minimum Rust version
  license:
    description: License string

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6

    - name: Read Cargo.toml
      id: version
      shell: bash
      run: |
        version=$(grep '^version' Cargo.toml | head -n1 | cut -d'"' -f2)
        name=$(grep '^name' Cargo.toml | head -n1 | cut -d'"' -f2)
        msrv=$(grep '^rust-version' Cargo.toml | head -n1 | cut -d'"' -f2)
        license=$(grep '^license' Cargo.toml | head -n1 | cut -d'"' -f2)
        
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "name=$name" >> $GITHUB_OUTPUT
        echo "msrv=$msrv" >> $GITHUB_OUTPUT
        echo "license=$license" >> $GITHUB_OUTPUT
