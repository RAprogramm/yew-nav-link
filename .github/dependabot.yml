version: 2

updates:
  # =====================================================
  # CARGO DEPENDENCIES
  # =====================================================
  
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Moscow
    commit-message:
      prefix: "deps(cargo)"
      include: "scope"
    labels:
      - dependencies
      - rust
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: /-
    rebase-strategy: auto
    
    # Version update groups
    groups:
      yew-ecosystem:
        patterns:
          - "yew*"
          - "gloo*"
          - "wasm-bindgen*"
          - "web-sys"
          - "js-sys"
        update-types:
          - minor
          - patch
      router-ecosystem:
        patterns:
          - "yew-router*"
        update-types:
          - minor
          - patch
      criterion:
        patterns:
          - "criterion"
          - "criterion-plot"
          - "tinytemplate"
        update-types:
          - minor
          - patch
      rust-minor:
        patterns:
          - "*"
        exclude-patterns:
          - "yew*"
          - "gloo*"
          - "wasm-bindgen*"
          - "web-sys"
          - "js-sys"
          - "yew-router*"
          - "criterion*"
          - "tinytemplate"
        update-types:
          - minor
          - patch
    
    # Allow direct updates for major versions
    ignore:
      - dependency-name: "yew"
        update-types: ["version-update:semver-major"]
      - dependency-name: "yew-router"
        update-types: ["version-update:semver-major"]

  # =====================================================
  # GitHub ACTIONS
  # =====================================================
  
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Moscow
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    labels:
      - dependencies
      - ci
      - github-actions
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: /-
    rebase-strategy: auto
    
    groups:
      actions:
        patterns:
          - "*"
        exclude-patterns:
          - "actions/checkout"
          - "actions/upload-artifact"
        update-types:
          - minor
          - patch
      checkout:
        patterns:
          - "actions/checkout"
        update-types:
          - minor
          - patch

  # =====================================================
  # DEPENDENCY REVIEW PROTECTION
  # =====================================================
  
  # This section configures how Dependabot interacts with PRs
  
  # Auto-close PRs when dependencies are updated manually
  # Dependabot will automatically close PRs when it detects
  # that the dependency has been updated manually

# =====================================================
# SECURITY SETTINGS
# =====================================================

# Dependabot security updates
security_updates_enabled: true

# Alert on vulnerable dependencies
vulnerability-alerts:
  enabled: true
