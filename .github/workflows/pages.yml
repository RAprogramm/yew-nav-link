name: Deploy Demo to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "examples/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # =====================================================
  # BUILD DEMO
  # =====================================================
  
  build:
    name: 🏗️ Build Demo
    runs-on: ubuntu-latest    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo git
        uses: actions/cache@v6
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install trunk
        uses: taiki-e/install-action@trunk

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: examples/comprehensive/package-lock.json

      - name: Install dependencies
        working-directory: examples/comprehensive
        run: npm ci

      - name: Build comprehensive demo
        working-directory: examples/comprehensive
        run: |
          trunk build --release --public-url ./
          echo "Build completed!"
          ls -la dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: examples/comprehensive/dist
          retention-days: 30

  # =====================================================
  # DEPLOY TO GITHUB PAGES
  # =====================================================
  
  deploy:
    name: 🚀 Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Deployment Summary
        run: |
          echo "# 🌐 Demo Deployment"
          echo ""
          echo "## Status: ✅ Deployed"
          echo ""
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "The comprehensive demo for yew-nav-link is now live!"

  # =====================================================
  # VALIDATE BUILD
  # =====================================================
  
  validate:
    name: ✅ Validate Build
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download Pages artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-artifact
          path: dist

      - name: Verify index.html
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ index.html not found"
            exit 1
          fi
          echo "✅ index.html found"

      - name: Check file sizes
        run: |
          echo "## Build Output Sizes"
          echo ""
          echo "| File | Size |"
          echo "|------|------|"
          find dist -type f -name "*.js" -o -name "*.css" -o -name "*.html" | while read file; do
            size=$(du -h "$file" | cut -f1)
            basename=$(basename "$file")
            echo "|$basename | $size |"
          done

      - name: Validate HTML
        run: |
          echo "Validating HTML..."
          # Basic HTML validation
          grep -q "<!DOCTYPE html" dist/index.html && echo "✅ Valid HTML5"
