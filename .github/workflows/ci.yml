name: Main CI

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "develop"]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # =====================================================
  # MAIN CI PIPELINE
  # =====================================================
  
  ci:
    name: 🔄 CI Pipeline
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    uses: ./.github/workflows/reusable-ci.yml
    with:
      all-features: true
    secrets: inherit

  # =====================================================
  # SUPPLY CHAIN SECURITY (ON MAIN)
  # =====================================================
  
  supply-chain:
    name: 📦 Supply Chain
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/supply-chain-security.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: read
      security-events: write

  # =====================================================
  # DOCUMENTATION (ON MAIN)
  # =====================================================
  
  docs:
    name: 📖 Documentation
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read

  # =====================================================
  # PAGES DEPLOYMENT
  # =====================================================
  
  pages:
    name: 🌐 Pages
    if: github.ref == 'refs/heads/main'
    needs: [ci]
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
