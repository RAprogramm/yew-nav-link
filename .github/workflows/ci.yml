name: CI

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish to crates.io even if version hasn't changed"
        required: false
        default: "false"
        type: boolean
      skip_tests:
        description: "Skip all tests jobs"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  issues: read
  discussions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  msrv:
    uses: ./.github/workflows/jobs/msrv.yml

  check:
    needs: msrv
    strategy:
      fail-fast: false
      matrix:
        rust:
          - ${{ needs.msrv.outputs.msrv }}
          - stable
          - nightly
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    uses: ./.github/workflows/jobs/check.yml
    with:
      rust: ${{ matrix.rust }}
      os: ${{ matrix.os }}

  fmt:
    uses: ./.github/workflows/jobs/fmt.yml

  docs:
    uses: ./.github/workflows/jobs/docs.yml

  no_std:
    uses: ./.github/workflows/jobs/no_std.yml

  security:
    uses: ./.github/workflows/jobs/security.yml

  reuse:
    uses: ./.github/workflows/jobs/reuse.yml

  test:
    needs: msrv
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests == 'false' }}
    uses: ./.github/workflows/jobs/test.yml
    with:
      rust: ${{ needs.msrv.outputs.msrv }}

  coverage:
    needs: msrv
    uses: ./.github/workflows/jobs/coverage.yml

  benchmarks:
    uses: ./.github/workflows/jobs/benchmarks.yml

  changelog:
    uses: ./.github/workflows/jobs/changelog.yml

  release:
    needs: [msrv, check, fmt, docs, no_std, security, reuse, changelog]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/jobs/release.yml
    secrets:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  artifacts:
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/jobs/artifacts.yml

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [msrv, check, fmt, docs, no_std, security, reuse, test, coverage, benchmarks, changelog, release, artifacts]
    if: always()
    steps:
      - name: Check job status
        run: |
          echo "All CI jobs completed"
          echo "Job outcomes:"
          echo "  MSRV: ${{ needs.msrv.result }}"
          echo "  Check: ${{ needs.check.result }}"
          echo "  Format: ${{ needs.fmt.result }}"
          echo "  Docs: ${{ needs.docs.result }}"
          echo "  no-std: ${{ needs.no_std.result }}"
          echo "  Security: ${{ needs.security.result }}"
          echo "  REUSE: ${{ needs.reuse.result }}"
          echo "  Test: ${{ needs.test.result }}"
          echo "  Coverage: ${{ needs.coverage.result }}"
          echo "  Benchmarks: ${{ needs.benchmarks.result }}"
          echo "  Changelog: ${{ needs.changelog.result }}"
          echo "  Release: ${{ needs.release.result }}"
          echo "  Artifacts: ${{ needs.artifacts.result }}"
          
          if [[ "${{ needs.msrv.result }}" != "success" || "${{ needs.check.result }}" != "success" || "${{ needs.fmt.result }}" != "success" || "${{ needs.docs.result }}" != "success" || "${{ needs.no_std.result }}" != "success" || "${{ needs.security.result }}" != "success" || "${{ needs.reuse.result }}" != "success" || ("${{ needs.test.result }}" != "success" && "${{ needs.test.result }}" != "skipped") || ("${{ needs.coverage.result }}" != "success" && "${{ needs.coverage.result }}" != "skipped") || "${{ needs.changelog.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          
          echo "✅ CI succeeded"
