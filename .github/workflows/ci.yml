name: Main CI

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "develop"]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # =====================================================
  # STAGE 1: FAST CHECKS (run in parallel)
  # =====================================================

  pr-analysis:
    name: PR Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    outputs:
      size: ${{ steps.pr-size.outputs.size }}
      weighted-score: ${{ steps.pr-size.outputs.weighted-score }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch main for comparison
        run: git fetch origin main:main || true

      - name: Analyze PR Size
        id: pr-size
        uses: RAprogramm/rust-prod-diff-checker@v1
        with:
          config_file: .rust-diff-analyzer.toml
          max_prod_units: 100
          max_weighted_score: 500
          max_prod_lines: 500
          fail_on_exceed: false
          post_comment: false

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic -W clippy::nursery

  # =====================================================
  # STAGE 2: TEST & BUILD (after fmt, clippy pass)
  # =====================================================

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --no-fail-fast --profile ci --status-level all --failure-output immediate --retries 1

      - name: Run doc tests
        run: cargo test --doc --workspace --all-features

  # =====================================================
  # STAGE 3: ANALYSIS (after test passes)
  # =====================================================

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: unittests,integration
          name: codecov-rust
          fail_ci_if_error: false
          verbose: true

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
      - uses: ./.github/actions/check-lockfile
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check package metadata
        run: cargo publish --dry-run --allow-dirty

      - name: Package
        run: cargo package --locked

      - name: Verify package contents
        run: cargo package --locked --list

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        run: cargo audit --deny yanked --ignore RUSTSEC-2025-0141 --ignore RUSTSEC-2024-0370

      - uses: taiki-e/install-action@cargo-deny

      - name: Run license audit
        run: cargo deny check

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Run cargo-quality
        uses: RAprogramm/cargo-quality@v0
        with:
          path: src/
          fail_on_issues: ${{ github.ref == 'refs/heads/main' }}
          post_comment: ${{ github.event_name == 'pull_request' }}

      - name: Check for TODO comments
        run: |
          TODO_COUNT=$(grep -r "// TODO" src/ --include="*.rs" | wc -l)
          echo "TODO comments found: $TODO_COUNT"

  # =====================================================
  # STAGE 4: DEPLOY (main branch only)
  # =====================================================

  supply-chain:
    name: Supply Chain
    needs: [package]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/supply-chain-security.yml
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: read
      security-events: write

  docs:
    name: Documentation
    needs: [package]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read

  pages:
    name: Pages
    needs: [package]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  # =====================================================
  # STAGE 5: SUMMARY
  # =====================================================

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, coverage, package, audit, quality]
    if: always()
    steps:
      - name: Generate CI Summary
        run: |
          echo "# CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| fmt | ${{ needs.fmt.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| clippy | ${{ needs.clippy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| package | ${{ needs.package.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| audit | ${{ needs.audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY