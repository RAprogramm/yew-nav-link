name: CI

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish to crates.io even if version hasn't changed"
        required: false
        default: "false"
        type: boolean
      skip_tests:
        description: "Skip all tests jobs"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  issues: read
  discussions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  msrv:
    name: Extract MSRV
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.parse_msrv.outputs.msrv }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Parse MSRV from Cargo.toml
        id: parse_msrv
        run: |
          MSRV=$(grep -E "rust-version\s*=\s*\"" Cargo.toml | sed 's/.*"\([^"]*\)".*/\1/')
          echo "msrv=$MSRV" >> "$GITHUB_OUTPUT"

  check:
    name: Check
    needs: msrv
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.rust == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        rust:
          - ${{ needs.msrv.outputs.msrv }}
          - stable
          - nightly
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}-${{ matrix.os }}-check
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check with all features
        run: cargo check --all-features

      - name: Check with no default features
        run: cargo check --no-default-features

      - name: Clippy with all targets and all features
        run: |
          cargo clippy --all-targets --all-features -- --deny warnings

      - name: Clippy with no default features
        run: |
          cargo clippy --no-default-features -- --deny warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: fmt
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-docs

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: docs
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build documentation
        run: |
          RUSTDOCFLAGS="-D warnings" cargo doc --all-features

  no_std:
    name: no-std
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check no_std feasibility
        run: |
          echo "This crate requires Yew which does not support no_std"
          exit 0

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: security
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo-audit
        run: cargo audit

  reuse:
    name: REUSE Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install reuse
        run: pip install --user reuse

      - name: Check REUSE compliance
        run: reuse lint

  test:
    name: Test
    needs: msrv
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_tests == 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ needs.msrv.outputs.msrv }}

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ needs.msrv.outputs.msrv }}-test
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests with nextest
        run: cargo nextest run --all-features --profile ci

      - name: Run doctests
        run: cargo test --doc --all-features

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Generate coverage
        run: |
          cargo llvm-cov nextest --all-features --profile ci --lcov --output-path lcov.info
          cargo llvm-cov report --html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage summary
        run: |
           COVERAGE=$(cargo llvm-cov report 2>/dev/null | grep TOTAL | awk '{print $NF}' || echo "N/A")
           echo "## Coverage: $COVERAGE" >> "$GITHUB_STEP_SUMMARY"

  benchmarks:
    name: Benchmarks
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: benchmarks
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run benchmarks
        run: cargo bench --no-run

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update CHANGELOG.md
        id: changelog
        run: |
          if [ -n "$GITHUB_REF_NAME" ]; then
            git-cliff --tag "$GITHUB_REF_NAME" --unreleased 2>/dev/null || true
          else
            git-cliff --unreleased 2>/dev/null || true
          fi

  release:
    name: Release
    needs: [msrv, check, fmt, docs, no_std, security, reuse, changelog, actionlint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check version change
        id: version_check
        run: |
          CURRENT_VERSION=$(grep -E "version\s*=\s*\"" Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Version has changed from $LATEST_VERSION to $CURRENT_VERSION"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged"
          fi

      - name: Build release artifact
        run: cargo build --release --all-features

      - name: Publish to crates.io
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          cargo login ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Create GitHub release
        if: steps.version_check.outputs.version_changed == 'true'
        uses: actions/create-release@v1
        with:
          tag_name: v${{ steps.version_check.outputs.current_version }}
          name: v${{ steps.version_check.outputs.current_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  artifacts:
    name: Security Artifacts
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build release artifact
        run: cargo build --release --all-features

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        run: |
          cargocyclonedx --output sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: target/release/yew-nav-link*

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-version: latest

      - name: Sign with Sigstore
        run: |
          cosign sign-blob --yes --output-signature sbom.cdx.json.sig sbom.cdx.json
        env:
          COSIGN_EXPERIMENTAL: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            sbom.cdx.json
            sbom.cdx.json.sig
          retention-days: 7

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [msrv, check, fmt, docs, no_std, security, reuse, test, coverage, benchmarks, changelog, actionlint, release, artifacts]
    if: always()
    steps:
      - name: Check job status
        run: |
          echo "All CI jobs completed"
          echo "Job outcomes:"
          echo "  MSRV: ${{ needs.msrv.result }}"
          echo "  Check: ${{ needs.check.result }}"
          echo "  Format: ${{ needs.fmt.result }}"
          echo "  Docs: ${{ needs.docs.result }}"
          echo "  no-std: ${{ needs.no_std.result }}"
          echo "  Security: ${{ needs.security.result }}"
          echo "  REUSE: ${{ needs.reuse.result }}"
          echo "  Test: ${{ needs.test.result }}"
          echo "  Coverage: ${{ needs.coverage.result }}"
          echo "  Benchmarks: ${{ needs.benchmarks.result }}"
          echo "  Changelog: ${{ needs.changelog.result }}"
          echo "  Actionlint: ${{ needs.actionlint.result }}"
          echo "  Release: ${{ needs.release.result }}"
          echo "  Artifacts: ${{ needs.artifacts.result }}"
          
          if [[ "${{ needs.msrv.result }}" != "success" || "${{ needs.check.result }}" != "success" || "${{ needs.fmt.result }}" != "success" || "${{ needs.docs.result }}" != "success" || "${{ needs.no_std.result }}" != "success" || "${{ needs.security.result }}" != "success" || "${{ needs.reuse.result }}" != "success" || ("${{ needs.test.result }}" != "success" && "${{ needs.test.result }}" != "skipped") || ("${{ needs.coverage.result }}" != "success" && "${{ needs.coverage.result }}" != "skipped") || ("${{ needs.benchmarks.result }}" != "success" && "${{ needs.benchmarks.result }}" != "skipped") || ("${{ needs.changelog.result }}" != "success" && "${{ needs.changelog.result }}" != "skipped") || ("${{ needs.release.result }}" != "success" && "${{ needs.release.result }}" != "skipped") || ("${{ needs.artifacts.result }}" != "success" && "${{ needs.artifacts.result }}" != "skipped") || "${{ needs.actionlint.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          
          echo "✅ CI succeeded"
