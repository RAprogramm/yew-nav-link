name: Supply Chain Security

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-attest:
    name: 🔐 Build & Attest
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --locked --all-features

      - name: Generate Build Provenance
        uses: actions/attest-build-provenance@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          subject-name: "crates.io/yew-nav-link"
          subject-digest: "${{ github.sha }}"
          push-to-registry: false

  sbom:
    name: 📋 SBOM Generation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate SBOM with cargo-hack
        run: |
          cargo tree --format "{p}" > sbom.txt
          echo "SBOM generated with $(wc -l < sbom.txt) dependencies"

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.txt
          retention-days: 90

  dependency-graph:
    name: 📊 Dependency Graph
    runs-on: ubuntu-latest
    permissions:
      contents: read
      dependencies: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update dependency graph
        uses: actions/dependency-submission@v4
        with:
          file: Cargo.lock
          tool: cargo
