name: Changelog Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version for changelog generation"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  changelog-update:
    name: 📝 Update Changelog
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --latest --prepend CHANGELOG.md
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

      - name: Display changelog preview
        run: |
          echo "## Changelog Preview"
          echo ""
          head -100 CHANGELOG.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        if: github.event_name == 'push'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update changelog"
          author: |
            name: github-actions[bot]
            email: github-actions[bot]@users.noreply.github.com
          signoff: false
          branch: chore/update-changelog
          delete-branch: true
          title: "chore: update changelog"
          body: |
            Automated changelog update by git-cliff.
            
            Generated from conventional commits since last release.
            
            ## Preview
            
            ```markdown
            $(head -50 CHANGELOG.md)
            ```
          labels: |
            chore
            documentation
          draft: false

  changelog-validate:
    name: ✅ Validate Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate changelog format
        run: |
          echo "Validating CHANGELOG.md..."
          
          # Check if file exists
          if [ ! -f CHANGELOG.md ]; then
            echo "❌ CHANGELOG.md not found"
            exit 1
          fi
          
          # Check for proper format
          if ! grep -q "## \[" CHANGELOG.md; then
            echo "❌ No version entries found in CHANGELOG.md"
            exit 1
          fi
          
          # Get latest version
          LATEST=$(grep -oP "## \[\K[0-9.]++" CHANGELOG.md | head -1)
          echo "Latest version in changelog: $LATEST"
          
          # Compare with Cargo.toml
          CARGO_VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')
          echo "Cargo.toml version: $CARGO_VERSION"
          
          if [ "$LATEST" != "$CARGO_VERSION" ]; then
            echo "⚠️  Version mismatch detected"
          else
            echo "✅ Versions match"
          fi

  release-notes-preview:
    name: 📋 Release Notes Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Display release notes
        run: |
          echo "## Release Notes Preview"
          echo ""
          cat CHANGELOG.md | head -100
