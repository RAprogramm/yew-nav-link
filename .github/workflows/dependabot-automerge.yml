name: Dependabot Auto-Merge & Auto-Approve

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  # =====================================================
  # AUTO-APPROVE DEPENDABOT PRs
  # =====================================================
  
  auto-approve:
    name: ✅ Auto-Approve
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'dependabot-preview[bot]'
    
    steps:
      - name: Auto-approve PR
        uses: hmarr/auto-approve-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: |
            Auto-approving Dependabot PR
            
            ## Verification
            
            - ✅ Submitted by Dependabot
            - ✅ Passing all checks
            - ✅ Meets merge criteria

  # =====================================================
  # WAIT FOR CI AND AUTO-MERGE
  # =====================================================
  
  auto-merge:
    name: 🔄 Auto-Merge
    runs-on: ubuntu-latest
    needs: auto-approve
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'dependabot-preview[bot]'
    
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine merge strategy
        id: strategy
        run: |
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          
          case "$UPDATE_TYPE" in
            "version-update:semver-patch")
              echo "auto-merge=true" >> $GITHUB_OUTPUT
              echo "merge-method=squash" >> $GITHUB_OUTPUT
              echo "reason=Patch update - auto-merge enabled" >> $GITHUB_OUTPUT
              ;;
            "version-update:semver-minor")
              echo "auto-merge=true" >> $GITHUB_OUTPUT
              echo "merge-method=squash" >> $GITHUB_OUTPUT
              echo "reason=Minor update - auto-merge enabled" >> $GITHUB_OUTPUT
              ;;
            "version-update:semver-major")
              echo "auto-merge=false" >> $GITHUB_OUTPUT
              echo "merge-method=" >> $GITHUB_OUTPUT
              echo "reason=Major update - requires manual review" >> $GITHUB_OUTPUT
              ;;
            "version-update:semver-direct")
              echo "auto-merge=false" >> $GITHUB_OUTPUT
              echo "merge-method=" >> $GITHUB_OUTPUT
              echo "reason=Direct version update - requires manual review" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "auto-merge=false" >> $GITHUB_OUTPUT
              echo "merge-method=" >> $GITHUB_OUTPUT
              echo "reason=Unknown update type - requires manual review" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Wait for CI to complete
        uses: lewagon/wait-on-check-action@v1.7.0
        if: steps.strategy.outputs.auto-merge == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          check-names: 'CI Pipeline'
          wait-interval: 30
          max-wait-timeout: 600
          allowed-conclusions: 'success,skipped'
          ignore-hanging-actions: true

      - name: Enable auto-merge
        if: steps.strategy.outputs.auto-merge == 'true'
        uses: peter-evans/enable-issue-automerge@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request: ${{ github.event.pull_request.number }}
          merge-method: ${{ steps.strategy.outputs.merge-method }}

      - name: Add status for manual review
        if: steps.strategy.outputs.auto-merge == 'false'
        run: |
          echo "⏸️  PR requires manual review"
          echo "Reason: ${{ steps.strategy.outputs.reason }}"
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🤖 Dependabot Update Status
            
            **Update Type:** ${{ steps.metadata.outputs.update-type }}
            
            **Status:** ${{ steps.strategy.outputs.auto-merge == 'true' && '✅ Auto-merge enabled' || '⏸️ Requires manual review' }}
            
            **Reason:** ${{ steps.strategy.outputs.reason }}
            
            ---
            
            *This comment is automatically updated by the CI system*

  # =====================================================
  # SECURITY UPDATES PRIORITY
  # =====================================================
  
  security-priority:
    name: 🛡️ Security Updates Priority
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'dependabot-preview[bot]'
    
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add priority label for security updates
        if: steps.metadata.outputs.update-type == 'security-update'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['security', 'priority: high']
            })

      - name: Comment on security updates
        if: steps.metadata.outputs.update-type == 'security-update'
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🛡️ Security Update Detected
            
            This PR contains a **security update** and has been prioritized.
            
            **Affected Package:** ${{ steps.metadata.outputs.dependency-name }}
            
            Please review and merge as soon as possible.
