name: Dependabot Auto-Merge & Auto-Approve

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: dependabot-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  auto-approve:
    name: Auto-Approve
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'schedule' ||
      (github.event_name == 'schedule' && github.event.pull_request.user.login == 'dependabot[bot]')
    steps:
      - name: Auto-approve PR
        if: github.event_name == 'pull_request_target'
        uses: hmarr/auto-approve-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: "Auto-approving Dependabot PR"

  daily-check:
    name: Daily Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Check open Dependabot PRs
        run: |
          gh pr list --repo ${{ github.repository }} --state open --search "author:app/dependabot" --limit 5