name: Version Bump & Release Assistant

on:
  workflow_dispatch:
    inputs:
      version-type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - premajor
          - preminor
          - prepatch
          - prerelease
        default: "patch"
      release-notes:
        description: "Custom release notes (optional)"
        required: false
        type: string
      create-tag:
        description: "Create git tag"
        required: false
        type: boolean
        default: true
      create-pr:
        description: "Create pull request"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    name: 🔄 Bump Version
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.new-version.outputs.new-version }}
      current-version: ${{ steps.current-version.outputs.current-version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get current version
        id: current-version
        run: |
          CURRENT=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')
          echo "current-version=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"

      - name: Calculate new version
        id: new-version
        run: |
          CURRENT=${{ steps.current-version.outputs.current-version }}
          BUMP_TYPE=${{ github.event.inputs.version-type }}
          
          IFS='.' read -r major minor patch <<< "$CURRENT"
          
          case $BUMP_TYPE in
            major)
              NEW_VERSION="$((major + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${major}.$((minor + 1)).0"
              ;;
            patch)
              NEW_VERSION="${major}.${minor}.$((patch + 1))"
              ;;
            premajor)
              NEW_VERSION="$((major + 1)).0.0-alpha.1"
              ;;
            preminor)
              NEW_VERSION="${major}.$((minor + 1)).0-alpha.1"
              ;;
            prepatch)
              NEW_VERSION="${major}.${minor}.$((patch + 1))-alpha.1"
              ;;
            prerelease)
              # Extract prerelease info and increment
              if [[ "$CURRENT" == *-* ]]; then
                BASE="${CURRENT%%-*}"
                PRERELEASE="${CURRENT#*-}"
                if [[ "$PRERELEASE" == alpha.* ]]; then
                  NUM="${PRERELEASE#alpha.}"
                  NEW_VERSION="${BASE}-alpha.$((NUM + 1))"
                elif [[ "$PRERELEASE" == beta.* ]]; then
                  NEW_VERSION="${BASE%-*}-rc.1"
                else
                  NEW_VERSION="${BASE%-*}"
                fi
              else
                NEW_VERSION="${CURRENT}-alpha.1"
              fi
              ;;
            *)
              echo "Unknown bump type: $BUMP_TYPE"
              exit 1
              ;;
          esac
          
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update Cargo.toml
        run: |
          CURRENT=${{ steps.current-version.outputs.current-version }}
          NEW=${{ steps.new-version.outputs.new-version }}
          
          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" Cargo.toml
          
          echo "Updated Cargo.toml:"
          grep "^version" Cargo.toml

      - name: Update CHANGELOG.md header
        run: |
          NEW=${{ steps.new-version.outputs.new-version }}
          TODAY=$(date +%Y-%m-%d)
          
          # Add new changelog entry if not exists
          if ! grep -q "## \[$NEW\]" CHANGELOG.md; then
            {
              echo ""
              echo "## [$NEW] - $TODAY"
              echo ""
              echo "### Added"
              echo "- "
              echo ""
              echo "### Changed"
              echo "- "
              echo ""
              echo "### Fixed"
              echo "- "
            } >> CHANGELOG.md
            echo "Added new changelog entry for $NEW"
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create commit
        run: |
          git add Cargo.toml CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.new-version.outputs.new-version }} [skip ci]" || echo "No changes to commit"

      - name: Create tag
        if: github.event.inputs.create-tag == 'true'
        run: |
          git tag -a "v${{ steps.new-version.outputs.new-version }}" \
            -m "Release v${{ steps.new-version.outputs.new-version }}"
          git push origin "v${{ steps.new-version.outputs.new-version }}"

      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: Create Pull Request
        if: github.event.inputs.create-pr == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.new-version.outputs.new-version }}"
          branch: chore/bump-version-${{ steps.new-version.outputs.new-version }}
          title: "chore: bump version to ${{ steps.new-version.outputs.new-version }}"
          body: |
            ## Version Bump
            
            - **From:** ${{ steps.current-version.outputs.current-version }}
            - **To:** ${{ steps.new-version.outputs.new-version }}
            - **Type:** ${{ github.event.inputs.version-type }}
            
            ## Changes
            
            ${{ github.event.inputs.release-notes || 'No release notes provided.' }}
            
            ## Checklist
            
            - [ ] Tests passing
            - [ ] Documentation updated
            - [ ] CHANGELOG.md reviewed
            
            ---
            
            *Automated by Version Bump workflow*
          labels: "chore, dependencies"
          draft: false

  notify:
    name: 🔔 Notify
    runs-on: ubuntu-latest
    needs: bump-version
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "# Version Bump Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ needs.bump-version.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**New Version:** ${{ needs.bump-version.outputs.new-version || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
