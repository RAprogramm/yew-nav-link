name: CI Pipeline

on:
  push:
    branches: ["main", "develop", "release/*"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "develop"]
    types: [opened, synchronize, reopened, labeled]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # =====================================================
  # GATEKEEPER JOBS - Run first, fast failure
  # =====================================================
  
  pr-analysis:
    name: 🔍 PR Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    outputs:
      size: ${{ steps.pr-size.outputs.size }}
      weighted-score: ${{ steps.pr-size.outputs.weighted-score }}
      result: ${{ steps.pr-size.outputs.result }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Analyze PR Size
        id: pr-size
        uses: RAprogramm/rust-prod-diff-checker@v1
        with:
          config_file: .rust-diff-analyzer.toml
          max_prod_units: 50
          max_weighted_score: 200
          max_prod_lines: 200
          fail_on_exceed: ${{ github.ref == 'refs/heads/main' }}
          post_comment: true

      - name: Check for WIP label
        if: contains(github.event.pull_request.labels.*.name, 'WIP')
        run: |
          echo "PR is marked as WIP - skipping further checks"
          exit 0

  # =====================================================
  # QUALITY GATES - Run in parallel after PR analysis
  # =====================================================
  
  fmt:
    name: 📝 Format
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly-2024-12-01
          components: rustfmt

      - name: Check formatting
        run: cargo +nightly-2024-12-01 fmt --all -- --check

      - name: Auto-fix formatting (if allowed)
        if: failure() && contains(github.event.pull_request.labels.*.name, 'auto-format')
        run: |
          TARGET_BRANCH="${{ github.head_ref }}"
          cargo +nightly fmt --all
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-format code [skip ci]" || true
          git push origin HEAD:"$TARGET_BRANCH"

  clippy:
    name: 🦀 Clippy
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false
          cache-on-failure: true

      - name: Install SARIF tools
        run: cargo install clippy-sarif sarif-fmt

      - name: Run Clippy with SARIF
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features \
            --message-format=json \
            -- -D warnings \
            -- -W clippy::pedantic \
            -- -W clippy::nursery \
            2>&1 | clippy-sarif --stdout --no-fail | tee clippy.sarif | sarif-fmt
          CLIPPY_EXIT=$?
          set -e
          
          echo "Uploading SARIF to GitHub Code Scanning..."
          
          exit $CLIPPY_EXIT

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clippy.sarif
          category: clippy

  # =====================================================
  # MATRIX TESTING - Multi-platform, multi-toolchain
  # =====================================================
  
  test-matrix:
    name: 🧪 Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        os: [ubuntu-latest, ubuntu-24.04, macos-latest, windows-latest]
        rust: [stable]
        mode: [unit, wasm]
        include:
          # MSRV test
          - os: ubuntu-latest
            rust: 1.94.0
            mode: unit
          # Beta channel
          - os: ubuntu-latest
            rust: beta
            mode: unit
          # Nightly with nightly features
          - os: ubuntu-latest
            rust: nightly
            mode: unit
          # Wasm target
          - os: ubuntu-latest
            rust: stable
            mode: wasm
            target: wasm32-unknown-unknown
        exclude:
          - os: windows-latest
            rust: nightly
          - os: macos-latest
            rust: nightly
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target || 'x86_64-unknown-linux-gnu' }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.rust }}-${{ matrix.mode }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install nextest
        if: matrix.mode != 'wasm'
        uses: taiki-e/install-action@nextest

      - name: Install wasm-bindgen-cli
        if: matrix.mode == 'wasm'
        uses: taiki-e/install-action@wasm-bindgen-cli

      - name: Run tests (unit)
        if: matrix.mode == 'unit'
        run: |
          cargo nextest run --workspace \
            --no-fail-fast \
            --profile ci \
            --status-level info \
            --failure-output immediate \
            --retries 1

      - name: Run tests (integration)
        if: matrix.mode == 'integration'
        run: |
          cargo nextest run --workspace \
            --test-threads 1 \
            --no-fail-fast \
            --profile ci

      - name: Run tests (wasm)
        if: matrix.mode == 'wasm'
        run: |
          cargo build --target wasm32-unknown-unknown --workspace

      - name: Run doc tests
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        run: cargo test --doc --workspace --all-features

  # =====================================================
  # CODE COVERAGE
  # =====================================================
  
  coverage:
    name: 📊 Coverage
    runs-on: ubuntu-latest-8-cores
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Generate coverage
        run: |
          cargo llvm-cov --workspace --all-features \
            --lcov --output-path lcov.info \
            --html --output-dir coverage-html \
            --json --output-path coverage.json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage-html/
            lcov.info
            coverage.json
          retention-days: 30
          compression-level: 9

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info,coverage.json
          flags: unittests,integration
          name: codecov-rust
          fail_ci_if_error: false
          verbose: true

  # =====================================================
  # PACKAGE VALIDATION
  # =====================================================
  
  package:
    name: 📦 Package
    runs-on: ubuntu-latest
    needs: [test-matrix]
    if: ${{ !cancelled() && needs.test-matrix.result == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
      - uses: ./.github/actions/check-lockfile
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check package metadata
        run: cargo publish --dry-run --allow-dirty

      - name: Package
        run: cargo package --locked

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: crate-package
          path: target/package/*.crate
          retention-days: 14
          compression-level: 9

      - name: Verify package contents
        run: |
          echo "Package contents:"
          cargo package --locked --list

  # =====================================================
  # SECURITY AUDIT
  # =====================================================
  
  audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run security audit
        run: |
          cargo audit --deny warnings --deny unmaintained --deny yanked || echo "Audit completed with warnings"

      - name: Check for outdated dependencies
        uses: orhun/rio@v8
        with:
          args: --format markdown --depth 1

  # =====================================================
  # LINTING & QUALITY
  # =====================================================
  
  quality:
    name: 📈 Quality
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Run cargo-quality
        uses: RAprogramm/cargo-quality@v0
        with:
          path: src/
          fail_on_issues: ${{ github.ref == 'refs/heads/main' }}
          post_comment: ${{ github.event_name == 'pull_request' }}

      - name: Check for TODO comments
        run: |
          TODO_COUNT=$(grep -r "// TODO" src/ --include="*.rs" | wc -l)
          echo "TODO comments found: $TODO_COUNT"
          if [ $TODO_COUNT -gt 10 ]; then
            echo "Warning: More than 10 TODO comments found"
          fi

      - name: License header check
        run: |
          find src/ -name "*.rs" -exec grep -L "SPDX" {} \; | head -5 || true

  # =====================================================
  # SUMMARY JOB
  # =====================================================
  
  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      [fmt, clippy, test-matrix, coverage, package, audit, quality]
    steps:
      - name: Generate CI Summary
        run: |
          echo "# CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| fmt | ${{ needs.fmt.result == 'success' && '✅ success' || needs.fmt.result == 'failure' && '❌ failure' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| clippy | ${{ needs.clippy.result == 'success' && '✅ success' || needs.clippy.result == 'failure' && '❌ failure' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| test-matrix | ${{ needs.test-matrix.result == 'success' && '✅ success' || needs.test-matrix.result == 'failure' && '❌ failure' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| coverage | ${{ needs.coverage.result == 'success' && '✅ success' || needs.coverage.result == 'failure' && '❌ failure' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| package | ${{ needs.package.result == 'success' && '✅ success' || needs.package.result == 'failure' && '❌ failure' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| audit | ${{ needs.audit.result == 'success' && '✅ success' || needs.audit.result == 'failure' && '❌ failure' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| quality | ${{ needs.quality.result == 'success' && '✅ success' || needs.quality.result == 'failure' && '❌ failure' || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [Coverage Report](https://codecov.io/gh/${{ github.repository }})" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 [Package Artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
