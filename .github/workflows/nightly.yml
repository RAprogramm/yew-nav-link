name: Nightly Regression Suite

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # =====================================================
  # SECURITY AUDIT (ENHANCED)
  # =====================================================
  
  security-audit:
    name: 🔒 Enhanced Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run comprehensive security audit
        run: |
          echo "Running comprehensive security audit..."
          cargo audit \
            --deny warnings \
            --deny unmaintained \
            --deny yanked \
            --ignore RUSTSEC-2024-0000  # Add known false positives here

      - name: Generate audit report
        run: |
          cargo audit --format json > audit-report.json 2>/dev/null || true
          
          # Count vulnerabilities by severity
          echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f audit-report.json ]; then
            warnings=$(jq '[.vulnerabilities[] | select(.keywords[] == "WARNING")] | length' audit-report.json 2>/dev/null || echo "0")
            unmaintained=$(jq '[.vulnerabilities[] | select(.keywords[] == "UNMAINTAINED")] | length' audit-report.json 2>/dev/null || echo "0")
            yanked=$(jq '[.vulnerabilities[] | select(.keywords[] == "YANKED")] | length' audit-report.json 2>/dev/null || echo "0")
            
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Warnings | $warnings |" >> $GITHUB_STEP_SUMMARY
            echo "| Unmaintained | $unmaintained |" >> $GITHUB_STEP_SUMMARY
            echo "| Yanked | $yanked |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 90

  # =====================================================
  # DEPENDENCY UPDATES
  # =====================================================
  
  outdated-dependencies:
    name: 📦 Outdated Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check for outdated dependencies
        uses: orhun/rio@v8
        with:
          args: --format markdown --depth 1

      - name: Generate dependency report
        run: |
          echo "## Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          cargo outdated 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY || \
            echo "Install cargo-outdated: cargo install cargo-outdated" >> $GITHUB_STEP_SUMMARY

      - name: Generate dependency tree
        run: |
          cargo tree --depth 1 > dependency-tree.txt
          head -30 dependency-tree.txt

      - name: Upload dependency tree
        uses: actions/upload-artifact@v7
        with:
          name: dependency-tree
          path: dependency-tree.txt
          retention-days: 30

  # =====================================================
  # NIGHTLY COMPILATION
  # =====================================================
  
  nightly-build:
    name: 🌙 Nightly Rust Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build with nightly
        run: |
          cargo +nightly build --all-features --all-targets

      - name: Run nightly clippy
        run: |
          cargo +nightly clippy --all-features --all-targets \
            -- -D warnings \
            -- -W clippy::pedantic

  # =====================================================
  # FEATURE MATRIX TEST
  # =====================================================
  
  feature-matrix:
    name: 🧪 Feature Matrix Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "default"
          - "macros"
          - "default,macros"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: "Test feature combination: ${{ matrix.features || 'none' }}"
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            echo "Testing with no features..."
            cargo test --no-default-features
          else
            echo "Testing with features: ${{ matrix.features }}"
            cargo test --features "${{ matrix.features }}"
          fi

  # =====================================================
  # DOCSRS PREVIEW
  # =====================================================
  
  docsrs-preview:
    name: 📖 Docs.rs Preview
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build docs with docs.rs config
        run: |
          RUSTDOCFLAGS="-D warnings --cfg docsrs" \
          cargo doc --all-features --no-deps --document-private-items

      - name: Check for docs.rs warnings
        run: |
          cargo doc --all-features --no-deps 2>&1 | grep -i "warning" || echo "No warnings"

  # =====================================================
  # WASM BUILD TEST
  # =====================================================
  
  wasm-build:
    name: 🌐 Wasm Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@wasm-bindgen-cli

      - name: Build for Wasm
        run: |
          cargo build --release --target wasm32-unknown-unknown --all-features

      - name: Build Wasm package
        run: |
          cargo wasm-bindgen --target wasm32-unknown-unknown --release --all-features

      - name: Check Wasm output
        run: |
          echo "Wasm output:"
          ls -la target/wasm32-unknown-unknown/release/*.wasm 2>/dev/null || echo "No .wasm files"

  # =====================================================
  # INTEGRATION TESTS
  # =====================================================
  
  integration-tests:
    name: 🧩 Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run integration tests
        run: |
          cargo nextest run --workspace \
            --test-threads 1 \
            --no-fail-fast \
            --profile ci

  # =====================================================
  # EXAMPLES BUILD
  # =====================================================
  
  examples-build:
    name: 💡 Examples Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build all examples
        run: |
          cargo build --examples --all-features

      - name: Build comprehensive demo
        working-directory: examples/comprehensive
        run: |
          if command -v trunk &> /dev/null; then
            trunk build --release --public-url ./
          else
            cargo build --release
          fi

  # =====================================================
  # SUMMARY
  # =====================================================
  
  summary:
    name: 📊 Nightly Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - security-audit
      - outdated-dependencies
      - nightly-build
      - feature-matrix
      - docsrs-preview
      - wasm-build
      - integration-tests
      - examples-build
    
    steps:
      - name: Generate Summary
        run: |
          echo "# 🌙 Nightly Regression Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          for job in security-audit nightly-build feature-matrix wasm-build integration-tests; do
            status="${{ needs.$job.result }}"
            emoji="⏳"
            [ "$status" = "success" ] && emoji="✅"
            [ "$status" = "failure" ] && emoji="❌"
            [ "$status" = "skipped" ] && emoji="⏭️"
            echo "|$job | $emoji $status |" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Automated nightly regression suite*