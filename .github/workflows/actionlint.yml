name: Lint GitHub Actions Workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**/*.yml'
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**/*.yml'
      - '.github/actions/**'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download actionlint
        run: |
          curl -sSLo actionlint https://github.com/rhysd/actionlint/releases/download/v2.6.1/actionlint_2.6.1_linux_amd64
          chmod +x actionlint

      - name: Run actionlint on workflows
        run: |
          ./actionlint -color .github/workflows/*.yml
