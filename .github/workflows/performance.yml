name: Performance Monitoring

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  compile-time:
    name: ⏱️ Compile Time
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Measure cold compile time
        run: |
          rm -rf target
          START=$(date +%s)
          cargo build --release --all-features
          END=$(date +%s)
          DURATION=$((END - START))
          echo "Cold compile time: ${DURATION} seconds"
          echo "COMPILE_TIME_COLD=${DURATION}" >> $GITHUB_ENV

      - name: Measure incremental compile time
        run: |
          START=$(date +%s)
          cargo build --release --all-features
          END=$(date +%s)
          DURATION=$((END - START))
          echo "Incremental compile time: ${DURATION} seconds"
          echo "COMPILE_TIME_INCR=${DURATION}" >> $GITHUB_ENV

      - name: Summary
        run: |
          echo "## Compile Time Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cold | ${{ env.COMPILE_TIME_COLD }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Incremental | ${{ env.COMPILE_TIME_INCR }}s |" >> $GITHUB_STEP_SUMMARY

  binary-size:
    name: 📦 Binary Size
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --all-features

      - name: Analyze size
        run: |
          echo "## Binary Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f target/release/libyew_nav_link.rlib ]; then
            SIZE=$(du -h target/release/libyew_nav_link.rlib | cut -f1)
            echo "Library size: $SIZE"
            echo "| libyew_nav_link.rlib | $SIZE |" >> $GITHUB_STEP_SUMMARY
          fi

  wasm-size:
    name: 🌐 Wasm Size
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build for Wasm
        run: cargo build --release --target wasm32-unknown-unknown --all-features

      - name: Analyze Wasm size
        run: |
          echo "## Wasm Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f target/wasm32-unknown-unknown/release/libyew_nav_link.wasm ]; then
            SIZE=$(du -h target/wasm32-unknown-unknown/release/libyew_nav_link.wasm | cut -f1)
            echo "Wasm size: $SIZE"
            echo "| libyew_nav_link.wasm | $SIZE |" >> $GITHUB_STEP_SUMMARY
          fi
