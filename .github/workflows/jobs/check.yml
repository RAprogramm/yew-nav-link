name: Check

on:
  workflow_call:
    inputs:
      rust:
        required: true
        type: string
      os:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  issues: read
  discussions: write

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ${{ inputs.os }}
    timeout-minutes: 30
    continue-on-error: ${{ inputs.rust == 'nightly' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust }}
          components: rustfmt, clippy

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.rust }}-${{ inputs.os }}-check
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check with all features
        run: cargo check --all-features

      - name: Check with no default features
        run: cargo check --no-default-features

      - name: Clippy with all targets and all features
        run: |
          cargo clippy --all-targets --all-features -- --deny warnings

      - name: Clippy with no default features
        run: |
          cargo clippy --no-default-features -- --deny warnings

      - name: Step summary
        if: inputs.rust == 'nightly'
        run: |
          echo "✅ Check job completed (nightly build, continued on error)" >> $GITHUB_STEP_SUMMARY

      - name: Step summary
        if: inputs.rust != 'nightly'
        run: |
          echo "✅ Check job completed successfully" >> $GITHUB_STEP_SUMMARY
