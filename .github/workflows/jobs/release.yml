name: Release

on:
  workflow_call:
    secrets:
      CRATES_IO_TOKEN:
        required: true
      GITHUB_TOKEN:
        required: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Load cached target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: release
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check version change
        id: version_check
        run: |
          CURRENT_VERSION=$(grep -E "version\s*=\s*\"" Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          
          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Version has changed from $LATEST_VERSION to $CURRENT_VERSION"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged"
          fi

      - name: Build release artifact
        run: cargo build --release --all-features

      - name: Publish to crates.io
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          cargo login ${{ secrets.CRATES_IO_TOKEN }}
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Create GitHub release
        if: steps.version_check.outputs.version_changed == 'true'
        uses: actions/create-release@v5
        with:
          tag_name: v${{ steps.version_check.outputs.current_version }}
          name: v${{ steps.version_check.outputs.current_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Step summary
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          echo "✅ Release completed" >> $GITHUB_STEP_SUMMARY

      - name: Step summary
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          echo "✅ Release completed" >> "$GITHUB_STEP_SUMMARY"
 
      - name: Step summary
        if: steps.version_check.outputs.version_changed != 'true'
        run: |
          echo "ℹ️  Skipping release (version unchanged)" >> "$GITHUB_STEP_SUMMARY"
