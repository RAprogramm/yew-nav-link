name: MSRV (standalone)

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish to crates.io even if version hasn't changed"
        required: false
        default: "false"
        type: boolean
      skip_tests:
        description: "Skip all tests jobs"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  issues: read
  discussions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  msrv:
    name: Extract MSRV
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.parse_msrv.outputs.msrv }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Parse MSRV from Cargo.toml
        id: parse_msrv
        run: |
          MSRV=$(grep -E "rust-version\s*=\s*\"" Cargo.toml | sed 's/.*"\([^"]*\)".*/\1/')
          echo "msrv=$MSRV" >> $GITHUB_OUTPUT
          echo "_MSRV: $MSRV"
