name: Changelog

on:
  workflow_call:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update CHANGELOG.md
        id: changelog
        run: |
          if [ -n "$GITHUB_REF_NAME" ]; then
            git-cliff --tag "$GITHUB_REF_NAME" --unreleased
          else
            git-cliff --unreleased
          fi

      - name: Retry changelog generation
        if: ${{ failure() }}
        run: |
          git-cliff --unreleased

      - name: Step summary
        run: |
          echo "✅ Changelog generation completed" >> "$GITHUB_STEP_SUMMARY"
