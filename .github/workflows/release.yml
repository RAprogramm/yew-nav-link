name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.9.0)"
        required: false
        type: string
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # =====================================================
  # PRE-RELEASE CHECKS
  # =====================================================
  
  checks:
    name: ✅ Pre-release Checks
    uses: ./.github/workflows/reusable-ci.yml
    with:
      all-features: true
    permissions:
      contents: read
      security-events: write
      pull-requests: write

  # =====================================================
  # VERSION VALIDATION
  # =====================================================
  
  version-check:
    name: 🏷️ Version Validation
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      version: ${{ steps.version.outputs.version }}
      name: ${{ steps.version.outputs.name }}
      msrv: ${{ steps.version.outputs.msrv }}
      license: ${{ steps.version.outputs.license }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        uses: ./.github/actions/cargo-info

      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CARGO_VERSION="v${{ steps.version.outputs.version }}"
          
          echo "Tag: $TAG"
          echo "Cargo.toml version: $CARGO_VERSION"
          
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch!"
            echo "  Tag version: $TAG"
            echo "  Cargo.toml: $CARGO_VERSION"
            exit 1
          fi
          
          echo "✅ Version match confirmed"

  # =====================================================
  # CHANGELOG GENERATION
  # =====================================================
  
  changelog:
    name: 📝 Changelog
    runs-on: ubuntu-latest
    needs: version-check
    outputs:
      changelog: ${{ steps.cliff.outputs.changelog }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --verbose --latest --prepend CHANGELOG.md
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

      - name: Display changelog
        run: |
          echo "## Changelog for ${{ needs.version-check.outputs.version }}"
          echo ""
          echo "```
          $(head -50 CHANGELOG.md)
          ```"

  # =====================================================
  # PUBLISH TO CRATES.IO
  # =====================================================
  
  publish:
    name: 📦 Publish to crates.io
    runs-on: ubuntu-latest
    needs: [checks, version-check]
    environment:
      name: crates.io
      url: https://crates.io/crates/yew-nav-link
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ needs.version-check.outputs.msrv }}

      - name: Verify package
        run: cargo package --locked --verbose

      - name: Publish to crates.io
        run: |
          echo "Publishing ${{ needs.version-check.outputs.name }} v${{ needs.version-check.outputs.version }} to crates.io..."
          cargo +${{ needs.version-check.outputs.msrv }} publish \
            --locked \
            --token ${{ secrets.CRATES_IO_TOKEN }} \
            --verbose

      - name: Wait for index update
        run: |
          echo "Waiting for crates.io index to update..."
          sleep 10

      - name: Verify publication
        run: |
          echo "Verifying publication..."
          curl -s "https://crates.io/api/v1/crates/yew-nav-link/${{ needs.version-check.outputs.version }}/download" \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n"

  # =====================================================
  # GITHUB RELEASE
  # =====================================================
  
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, changelog, version-check]
    permissions:
      contents: write
      discussions: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION=${{ needs.version-check.outputs.version }}
          
          # Extract changelog section for this version
          changelog_section=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | head -n -1)
          
          if [ -z "$changelog_section" ]; then
            changelog_section="No changelog entry found."
          fi
          
          cat > release-notes.md << EOF
          # Release $VERSION
          
          ## 📦 Published to crates.io
          
          - **Package:** ${{ needs.version-check.outputs.name }}
          - **Version:** $VERSION
          - **License:** ${{ needs.version-check.outputs.license }}
          - **MSRV:** ${{ needs.version-check.outputs.msrv }}
          
          ## 📝 Changes
          
          $changelog_section
          
          ## 🔗 Links
          
          - [crates.io](https://crates.io/crates/yew-nav-link/$VERSION)
          - [Documentation](https://docs.rs/yew-nav-link/$VERSION)
          - [Source](https://github.com/${{ github.repository }}/tree/v$VERSION)
          EOF
          
          cat release-notes.md

      - name: Create/Update Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: "Release v${{ needs.version-check.outputs.version }}"
          body_path: release-notes.md
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: false
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload crate artifact
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          files: target/package/*.crate
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =====================================================
  # POST-RELEASE TASKS
  # =====================================================
  
  notify:
    name: 🔔 Notifications
    runs-on: ubuntu-latest
    needs: [release, version-check]
    if: always()
    
    steps:
      - name: Create summary
        run: |
          echo "# 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Release: v${{ needs.version-check.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.release.result }}" = "success" ]; then
            echo "### ✅ Status: Published" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Links:**" >> $GITHUB_STEP_SUMMARY
            echo "- 📦 [crates.io](https://crates.io/crates/yew-nav-link/${{ needs.version-check.outputs.version }})" >> $GITHUB_STEP_SUMMARY
            echo "- 📖 [Documentation](https://docs.rs/yew-nav-link/${{ needs.version-check.outputs.version }})" >> $GITHUB_STEP_SUMMARY
            echo "- 📝 [Release Notes](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version-check.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Status: Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi

  deploy-pages:
    name: 🌐 Deploy Demo
    needs: [release, version-check]
    if: always()
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
