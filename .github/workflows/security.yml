name: Security Scanning

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0"  # Weekly on Sunday
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  alerts: write

jobs:
  # =====================================================
  # CARGO AUDIT
  # =====================================================
  
  cargo-audit:
    name: 🔒 Cargo Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo-audit
        run: |
          cargo audit \
            --deny warnings \
            --deny unmaintained \
            --deny yanked

      - name: Generate SARIF report
        continue-on-error: true
        run: |
          cargo audit --format sarif > audit.sarif

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: audit.sarif
          category: cargo-audit

  # =====================================================
  # CLIPPY SECURITY
  # =====================================================
  
  clippy-security:
    name: 🦀 Clippy Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install clippy-sarif
        run: cargo install clippy-sarif sarif-fmt

      - name: Run Clippy with security checks
        run: |
          cargo clippy --all-features --all-targets \
            -- -D warnings \
            -- -W clippy::pedantic \
            -- -W clippy::unwrap_used \
            -- -W clippy::expect_used \
            2>&1 | clippy-sarif --stdout --no-fail | tee clippy.sarif | sarif-fmt

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clippy.sarif
          category: clippy-security

  # =====================================================
  # CODEQL ANALYSIS
  # =====================================================
  
  codeql-analysis:
    name: 🔍 CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          queries: +security-extended, +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

  # =====================================================
  # SECRETS SCANNING
  # =====================================================
  
  secrets-scanning:
    name: 🔐 Secrets Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: TruffleHog secrets detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --no-update

  # =====================================================
  # CARGO DENY
  # =====================================================
  
  cargo-deny:
    name: 🚫 Cargo Deny
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Create cargo-deny config
        run: |
          cat > Cargo-deny.toml << 'EOF'
          [advisories]
          yanked = "warn"
          unmaintained = "warn"

          [licenses]
          allow = [
            "MIT",
            "Apache-2.0",
            "BSD-3-Clause",
            "ISC",
          ]

          [bans]
          multiple-versions = "warn"
          wildcards = "warn"
          highlight = "all"

          [sources]
          unknown-registry = "warn"
          unknown-git = "warn"
          allow-registry = ["https://crates.io-index"]
          EOF

      - name: Check dependencies
        run: |
          cargo deny check advisories
          cargo deny check licenses
          cargo deny check bans
          cargo deny check sources

  # =====================================================
  # SAFETY DANCE
  # =====================================================
  
  safety-dance:
    name: 💃 Safety Dance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install safety-dance
        run: cargo install safety-dance --locked

      - name: Run safety-dance
        run: |
          safety-dance . 2>&1 || true

  # =====================================================
  # SUMMARY
  # =====================================================
  
  summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - cargo-audit
      - clippy-security
      - codeql-analysis
      - secrets-scanning
      - cargo-deny
    
    steps:
      - name: Generate Summary
        run: |
          echo "# 🔒 Security Scanning Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for job in cargo-audit clippy-security codeql-analysis secrets-scanning cargo-deny; do
            status="${{ needs.$job.result }}"
            emoji="⏳"
            [ "$status" = "success" ] && emoji="✅"
            [ "$status" = "failure" ] && emoji="❌"
            [ "$status" = "skipped" ] && emoji="⏭️"
            echo "|$job | $emoji $status |" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Automated security scanning*